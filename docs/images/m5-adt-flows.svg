<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 1340" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#374151" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="1340" fill="#ffffff"/>

  <!-- ============================================================ TITLE -->
  <text x="520" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    playtesthub — ADT linking + distribution flows (M5)
  </text>
  <text x="520" y="50" text-anchor="middle" font-size="12" fill="#475569">
    Per-studio linkage (D1) · Full-page redirect with state + studio_namespace (D2) · No credential exchange — auth via AGS service IAM JWT
  </text>

  <!-- ============================================================ SECTION 1: LINKING -->
  <text x="520" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">
    ① Linking — one-time per studio (reusable across every game namespace + every playtest)
  </text>

  <!-- Lane headers -->
  <g>
    <rect x="55" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="140" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">Admin (browser)</text>

    <rect x="285" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="370" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">Admin UI (Extend)</text>

    <rect x="515" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">playtesthub backend</text>

    <rect x="745" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="830" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">ADT</text>
  </g>

  <!-- Lane lines -->
  <g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3">
    <line x1="140" y1="132" x2="140" y2="680"/>
    <line x1="370" y1="132" x2="370" y2="680"/>
    <line x1="600" y1="132" x2="600" y2="680"/>
    <line x1="830" y1="132" x2="830" y2="680"/>
  </g>

  <!-- Linking step 1: Admin → AdminUI: Click "Link ADT Namespace" -->
  <g>
    <line x1="140" y1="158" x2="370" y2="158" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="255" y="152" text-anchor="middle" fill="#111827">1. Click "Link ADT Namespace"</text>
  </g>

  <!-- Linking step 2: AdminUI → Backend: StartADTLink() -->
  <g>
    <line x1="370" y1="190" x2="600" y2="190" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="184" text-anchor="middle" fill="#111827">2. StartADTLink()</text>
  </g>

  <!-- Note 1 -->
  <g>
    <rect x="625" y="200" width="295" height="54" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="635" y="217" font-size="11" fill="#713f12" font-style="italic">
      studio_ns := token.union_namespace ?? token.namespace ·
    </text>
    <text x="635" y="231" font-size="11" fill="#713f12" font-style="italic">
      generate 32-byte state · INSERT adt_link_pending(state,
    </text>
    <text x="635" y="245" font-size="11" fill="#713f12" font-style="italic">
      studio_namespace, started_by, expires_at = now()+10min)
    </text>
  </g>

  <!-- Linking step 3: Backend → AdminUI: {linkUrl, state} (return) -->
  <g>
    <line x1="600" y1="274" x2="370" y2="274" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="485" y="268" text-anchor="middle" fill="#111827">3. { linkUrl, state }</text>
  </g>

  <!-- Note 2 -->
  <g>
    <rect x="60" y="286" width="290" height="24" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="70" y="302" font-size="11" fill="#713f12" font-style="italic">
      sessionStorage.set('formDraft', currentForm)
    </text>
  </g>

  <!-- Linking step 4: AdminUI → Admin (browser nav) -->
  <g>
    <line x1="370" y1="330" x2="140" y2="330" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="255" y="324" text-anchor="middle" fill="#111827">4. window.location.href = linkUrl</text>
  </g>

  <!-- Linking step 5: Admin → ADT (full-page nav) -->
  <g>
    <line x1="140" y1="362" x2="830" y2="362" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="485" y="356" text-anchor="middle" fill="#111827">5. GET ${ADT_BASE_URL}/oauth/link?state=…&amp;redirect_uri=…&amp;studio_namespace=${studio_ns}</text>
  </g>

  <!-- Note 3 -->
  <g>
    <rect x="725" y="374" width="295" height="54" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="735" y="391" font-size="11" fill="#713f12" font-style="italic">
      operator signs in · picks adt_namespace · ADT
    </text>
    <text x="735" y="405" font-size="11" fill="#713f12" font-style="italic">
      records flag (adt_namespace, studio_namespace)
    </text>
    <text x="735" y="419" font-size="11" fill="#713f12" font-style="italic">
      linked = true · echoes adt_namespace in 302
    </text>
  </g>

  <!-- Linking step 6: ADT → Admin: 302 redirect back -->
  <g>
    <line x1="830" y1="448" x2="140" y2="448" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="485" y="442" text-anchor="middle" fill="#111827">6. 302 Location: ${ADT_REDIRECT_BASE_URL}/adt-link-callback?state=…&amp;result=success&amp;adt_namespace=&lt;picked&gt;</text>
  </g>

  <!-- Linking step 7: Admin → AdminUI: load callback route -->
  <g>
    <line x1="140" y1="480" x2="370" y2="480" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="255" y="474" text-anchor="middle" fill="#111827">7. browser loads /adt-link-callback</text>
  </g>

  <!-- Linking step 8: AdminUI → Backend: CompleteADTLink(state) -->
  <g>
    <line x1="370" y1="512" x2="600" y2="512" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="506" text-anchor="middle" fill="#111827">8. CompleteADTLink(state, adt_namespace)  // no grantCode</text>
  </g>

  <!-- Linking step 9: Backend self-loop (validate + insert + audit) — replaces former ADT exchange round-trip -->
  <g>
    <path d="M 600 540 L 644 540 L 644 572 L 600 572" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="654" y="553" fill="#111827">9. validate adt_link_pending(state) · INSERT adt_linkage</text>
    <text x="654" y="567" fill="#111827">    (studio_ns, adt_ns, linked_by) · audit · sweep state</text>
  </g>

  <!-- Note 4 -->
  <g>
    <rect x="620" y="578" width="300" height="40" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="630" y="594" font-size="11" fill="#713f12" font-style="italic">
      adt_linkage has NO credential columns —
    </text>
    <text x="630" y="608" font-size="11" fill="#713f12" font-style="italic">
      identity row only (studio_ns, adt_ns)
    </text>
  </g>

  <!-- Linking step 10: Backend → AdminUI: ADTLinkage -->
  <g>
    <line x1="600" y1="636" x2="370" y2="636" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="485" y="630" text-anchor="middle" fill="#111827">10. ADTLinkage</text>
  </g>

  <!-- Linking step 11: AdminUI → Admin -->
  <g>
    <line x1="370" y1="668" x2="140" y2="668" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="255" y="662" text-anchor="middle" fill="#111827">11. redirect /playtests + success banner</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="700" x2="1000" y2="700" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============================================================ SECTION 2: DISTRIBUTION -->
  <text x="520" y="730" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">
    ② Distribution — per-applicant download URL on approve (auto-approve or manual)
  </text>

  <!-- Lane headers (section 2) -->
  <g>
    <rect x="55" y="748" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="140" y="769" text-anchor="middle" font-weight="600" fill="#14532d">Player (browser)</text>

    <rect x="285" y="748" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="370" y="769" text-anchor="middle" font-weight="600" fill="#14532d">playtesthub backend</text>

    <rect x="515" y="748" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="769" text-anchor="middle" font-weight="600" fill="#14532d">ADT</text>

    <rect x="745" y="748" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="830" y="769" text-anchor="middle" font-weight="600" fill="#14532d">Discord (DM queue → API)</text>
  </g>

  <!-- Lane lines -->
  <g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3">
    <line x1="140" y1="780" x2="140" y2="1270"/>
    <line x1="370" y1="780" x2="370" y2="1270"/>
    <line x1="600" y1="780" x2="600" y2="1270"/>
    <line x1="830" y1="780" x2="830" y2="1270"/>
  </g>

  <!-- Dist step 1: Player → Backend: Signup -->
  <g>
    <line x1="140" y1="808" x2="370" y2="808" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="255" y="802" text-anchor="middle" fill="#111827">1. Signup(playtestId)</text>
  </g>

  <!-- Note: auto_approve gate -->
  <g>
    <rect x="395" y="820" width="430" height="54" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="405" y="836" font-size="11" fill="#713f12" font-style="italic">
      if playtest.auto_approve = true:
    </text>
    <text x="405" y="850" font-size="11" fill="#713f12" font-style="italic">
      pg_advisory_xact_lock(hashtext('autoapprove:'||playtestId)) ·
    </text>
    <text x="405" y="864" font-size="11" fill="#713f12" font-style="italic">
      count(auto_approved=true) &lt; auto_approve_limit ?  → chain into approve path
    </text>
  </g>

  <!-- Dist step 2: Backend self-loop (mint service JWT) -->
  <g>
    <path d="M 370 896 L 410 896 L 410 918 L 370 918" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="420" y="911" fill="#111827">2. mint AGS service IAM JWT via pkg/ags (client_credentials; iss + union_namespace = studio_ns)</text>
  </g>

  <!-- Dist step 3: Backend → ADT: IssueDownloadURL -->
  <g>
    <line x1="370" y1="950" x2="600" y2="950" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="944" text-anchor="middle" fill="#111827">3. IssueDownloadURL(adtBuildId, applicantIdent) — Authorization: Bearer &lt;service JWT&gt;</text>
  </g>

  <!-- Note: ADT JWT validation -->
  <g>
    <rect x="625" y="962" width="295" height="40" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="635" y="978" font-size="11" fill="#713f12" font-style="italic">
      ADT validates JWT vs AGS JWKS · derives
    </text>
    <text x="635" y="992" font-size="11" fill="#713f12" font-style="italic">
      studio_ns from iss / union_namespace
    </text>
  </g>

  <!-- Dist step 4: ADT → Backend: url -->
  <g>
    <line x1="600" y1="1022" x2="370" y2="1022" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="485" y="1016" text-anchor="middle" fill="#111827">4. { url, expiresAt }</text>
  </g>

  <!-- Note: fallback -->
  <g>
    <rect x="395" y="1034" width="430" height="54" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="405" y="1050" font-size="11" fill="#713f12" font-style="italic">
      ADT 4xx/5xx → fall back to playtest.adt_fallback_download_url ·
    </text>
    <text x="405" y="1064" font-size="11" fill="#713f12" font-style="italic">
      ADT 401 → FailedPrecondition "linkage no longer exists or token rejected, re-link required" ·
    </text>
    <text x="405" y="1078" font-size="11" fill="#713f12" font-style="italic">
      audit records adtUrlSource = 'adt' | 'fallback'
    </text>
  </g>

  <!-- Dist step 5: Backend self-loop (audit + applicant update) -->
  <g>
    <path d="M 370 1104 L 414 1104 L 414 1138 L 370 1138" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="424" y="1118" fill="#111827">5. UPDATE applicant SET status=APPROVED, auto_approved=true</text>
    <text x="424" y="1132" fill="#111827">    · audit applicant.approve + applicant.auto_approved</text>
  </g>

  <!-- Dist step 6: Backend → DM Queue → Discord -->
  <g>
    <line x1="370" y1="1162" x2="830" y2="1162" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="600" y="1156" text-anchor="middle" fill="#111827">6. enqueue DM body: "Download your playtest build: &lt;url&gt;"</text>
  </g>

  <!-- Dist step 7: Discord → Player -->
  <g>
    <line x1="830" y1="1194" x2="140" y2="1194" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="1188" text-anchor="middle" fill="#111827">7. Discord delivers DM to applicant</text>
  </g>

  <!-- Dist step 8: Player → ADT: GET url -->
  <g>
    <line x1="140" y1="1228" x2="600" y2="1228" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="370" y="1222" text-anchor="middle" fill="#111827">8. player clicks link · GET &lt;url&gt; (downloads build directly from ADT)</text>
  </g>

  <!-- Note: player UI fallback -->
  <g>
    <rect x="60" y="1252" width="900" height="14" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="70" y="1263" font-size="11" fill="#713f12" font-style="italic">
      Player UI fallback: Pending.svelte for ADT playtests calls GetADTDownloadInfo(playtestId) (gated on APPROVED) and renders URL + expiry — DM is primary, in-UI is safety net.
    </text>
  </g>

  <!-- ============================================================ LEGEND -->
  <g transform="translate(60, 1295)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#111827">Legend:</text>

    <line x1="60" y1="-4" x2="110" y2="-4" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="118" y="0" font-size="11" fill="#374151">sync call / RPC</text>

    <line x1="225" y1="-4" x2="275" y2="-4" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="283" y="0" font-size="11" fill="#374151">return value</text>

    <line x1="370" y1="-4" x2="420" y2="-4" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="428" y="0" font-size="11" fill="#374151">browser navigation / 302</text>

    <rect x="585" y="-12" width="16" height="14" rx="2" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="608" y="0" font-size="11" fill="#374151">side-effect / DB write note</text>
  </g>
</svg>
