<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 1380" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#374151" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="1380" fill="#ffffff"/>

  <!-- ============================================================ TITLE -->
  <text x="520" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    playtesthub — ADT linking + distribution flows (M5)
  </text>
  <text x="520" y="50" text-anchor="middle" font-size="12" fill="#475569">
    Per-namespace linkage (D1) · Full-page redirect with state token (D2) · Per-applicant URL with static fallback (D3)
  </text>

  <!-- ============================================================ SECTION 1: LINKING -->
  <text x="520" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">
    ① Linking — one-time per ADT namespace (reusable across many playtests)
  </text>

  <!-- Lane headers -->
  <g>
    <rect x="55" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="140" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">Admin (browser)</text>

    <rect x="285" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="370" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">Admin UI (Extend)</text>

    <rect x="515" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="600" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">playtesthub backend</text>

    <rect x="745" y="100" width="170" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="830" y="121" text-anchor="middle" font-weight="600" fill="#1e3a8a">ADT</text>
  </g>

  <!-- Lane lines -->
  <g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3">
    <line x1="140" y1="132" x2="140" y2="700"/>
    <line x1="370" y1="132" x2="370" y2="700"/>
    <line x1="600" y1="132" x2="600" y2="700"/>
    <line x1="830" y1="132" x2="830" y2="700"/>
  </g>

  <!-- Linking step 1: Admin → AdminUI: Click "Link ADT Namespace" -->
  <g>
    <line x1="140" y1="158" x2="370" y2="158" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="255" y="152" text-anchor="middle" fill="#111827">1. Click "Link ADT Namespace"</text>
  </g>

  <!-- Linking step 2: AdminUI → Backend: StartADTLink() -->
  <g>
    <line x1="370" y1="190" x2="600" y2="190" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="184" text-anchor="middle" fill="#111827">2. StartADTLink()</text>
  </g>

  <!-- Note 1 -->
  <g>
    <rect x="625" y="200" width="290" height="38" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="635" y="217" font-size="11" fill="#713f12" font-style="italic">
      generate 32-byte state · INSERT adt_link_pending(state,
    </text>
    <text x="635" y="231" font-size="11" fill="#713f12" font-style="italic">
      namespace, started_by, expires_at = now()+10min)
    </text>
  </g>

  <!-- Linking step 3: Backend → AdminUI: {linkUrl, state} (return) -->
  <g>
    <line x1="600" y1="258" x2="370" y2="258" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="485" y="252" text-anchor="middle" fill="#111827">3. { linkUrl, state }</text>
  </g>

  <!-- Note 2 -->
  <g>
    <rect x="60" y="270" width="290" height="24" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="70" y="286" font-size="11" fill="#713f12" font-style="italic">
      sessionStorage.set('formDraft', currentForm)
    </text>
  </g>

  <!-- Linking step 4: AdminUI → Admin (browser nav) -->
  <g>
    <line x1="370" y1="314" x2="140" y2="314" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="255" y="308" text-anchor="middle" fill="#111827">4. window.location.href = linkUrl</text>
  </g>

  <!-- Linking step 5: Admin → ADT (full-page nav) -->
  <g>
    <line x1="140" y1="346" x2="830" y2="346" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="485" y="340" text-anchor="middle" fill="#111827">5. GET ${ADT_BASE_URL}/oauth/link?state=…&amp;redirect_uri=…&amp;ags_base_url=${AGS_BASE_URL}</text>
  </g>

  <!-- Note 3 -->
  <g>
    <rect x="725" y="358" width="295" height="38" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="735" y="375" font-size="11" fill="#713f12" font-style="italic">
      operator signs in · picks namespace · ADT keys
    </text>
    <text x="735" y="389" font-size="11" fill="#713f12" font-style="italic">
      its linkage on (adt_namespace, ags_base_url)
    </text>
  </g>

  <!-- Linking step 6: ADT → Admin: 302 redirect back -->
  <g>
    <line x1="830" y1="416" x2="140" y2="416" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="485" y="410" text-anchor="middle" fill="#111827">6. 302 Location: ${ADT_REDIRECT_BASE_URL}/adt-link-callback?state=…&amp;grantCode=…</text>
  </g>

  <!-- Linking step 7: Admin → AdminUI: load callback route -->
  <g>
    <line x1="140" y1="448" x2="370" y2="448" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="255" y="442" text-anchor="middle" fill="#111827">7. browser loads /adt-link-callback</text>
  </g>

  <!-- Linking step 8: AdminUI → Backend: CompleteADTLink -->
  <g>
    <line x1="370" y1="480" x2="600" y2="480" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="474" text-anchor="middle" fill="#111827">8. CompleteADTLink(state, grantCode)</text>
  </g>

  <!-- Linking step 9: Backend → ADT: ExchangeGrantCode -->
  <g>
    <line x1="600" y1="512" x2="830" y2="512" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="715" y="506" text-anchor="middle" fill="#111827">9. ExchangeGrantCode(grantCode)</text>
  </g>

  <!-- Linking step 10: ADT → Backend: credential -->
  <g>
    <line x1="830" y1="544" x2="600" y2="544" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="715" y="538" text-anchor="middle" fill="#111827">10. { credential, adtNamespace }</text>
  </g>

  <!-- Note 4 -->
  <g>
    <rect x="620" y="556" width="295" height="54" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="630" y="572" font-size="11" fill="#713f12" font-style="italic">
      encrypt(credential, ADT_CREDENTIAL_KEK)
    </text>
    <text x="630" y="586" font-size="11" fill="#713f12" font-style="italic">
      INSERT adt_linkage(namespace, adt_namespace,
    </text>
    <text x="630" y="600" font-size="11" fill="#713f12" font-style="italic">
      ciphertext, kek_version, linked_by, linked_at)
    </text>
  </g>

  <!-- Linking step 11: Backend → AdminUI: ADTLinkage -->
  <g>
    <line x1="600" y1="632" x2="370" y2="632" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="485" y="626" text-anchor="middle" fill="#111827">11. ADTLinkage</text>
  </g>

  <!-- Linking step 12: AdminUI → Admin -->
  <g>
    <line x1="370" y1="664" x2="140" y2="664" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="255" y="658" text-anchor="middle" fill="#111827">12. redirect /playtests + success banner</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="730" x2="1000" y2="730" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============================================================ SECTION 2: DISTRIBUTION -->
  <text x="520" y="762" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">
    ② Distribution — per-applicant download URL on approve (auto-approve or manual)
  </text>

  <!-- Lane headers (section 2) -->
  <g>
    <rect x="55" y="780" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="140" y="801" text-anchor="middle" font-weight="600" fill="#14532d">Player (browser)</text>

    <rect x="285" y="780" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="370" y="801" text-anchor="middle" font-weight="600" fill="#14532d">playtesthub backend</text>

    <rect x="515" y="780" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="801" text-anchor="middle" font-weight="600" fill="#14532d">ADT</text>

    <rect x="745" y="780" width="170" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="830" y="801" text-anchor="middle" font-weight="600" fill="#14532d">Discord (DM queue → API)</text>
  </g>

  <!-- Lane lines -->
  <g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3">
    <line x1="140" y1="812" x2="140" y2="1310"/>
    <line x1="370" y1="812" x2="370" y2="1310"/>
    <line x1="600" y1="812" x2="600" y2="1310"/>
    <line x1="830" y1="812" x2="830" y2="1310"/>
  </g>

  <!-- Dist step 1: Player → Backend: Signup -->
  <g>
    <line x1="140" y1="840" x2="370" y2="840" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="255" y="834" text-anchor="middle" fill="#111827">1. Signup(playtestId)</text>
  </g>

  <!-- Note: auto_approve gate -->
  <g>
    <rect x="395" y="852" width="430" height="54" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="405" y="868" font-size="11" fill="#713f12" font-style="italic">
      if playtest.auto_approve = true:
    </text>
    <text x="405" y="882" font-size="11" fill="#713f12" font-style="italic">
      pg_advisory_xact_lock(hashtext('autoapprove:'||playtestId)) ·
    </text>
    <text x="405" y="896" font-size="11" fill="#713f12" font-style="italic">
      count(auto_approved=true) &lt; auto_approve_limit ?  → chain into approve path
    </text>
  </g>

  <!-- Dist step 2: Backend self-loop (decrypt credential) -->
  <g>
    <path d="M 370 928 L 410 928 L 410 950 L 370 950" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="420" y="943" fill="#111827">2. decrypt(adt_linkage.ciphertext, KEK[version])</text>
  </g>

  <!-- Dist step 3: Backend → ADT: IssueDownloadURL -->
  <g>
    <line x1="370" y1="982" x2="600" y2="982" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="976" text-anchor="middle" fill="#111827">3. IssueDownloadURL(credential, adtBuildId, applicantIdent)</text>
  </g>

  <!-- Dist step 4: ADT → Backend: url -->
  <g>
    <line x1="600" y1="1014" x2="370" y2="1014" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="485" y="1008" text-anchor="middle" fill="#111827">4. { url, expiresAt }</text>
  </g>

  <!-- Note: fallback -->
  <g>
    <rect x="395" y="1026" width="430" height="40" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="405" y="1042" font-size="11" fill="#713f12" font-style="italic">
      ADT 4xx/5xx → fall back to playtest.adt_fallback_download_url ·
    </text>
    <text x="405" y="1056" font-size="11" fill="#713f12" font-style="italic">
      ADT 401 → FailedPrecondition "re-link required" · audit records adtUrlSource
    </text>
  </g>

  <!-- Dist step 5: Backend self-loop (audit + applicant update) -->
  <g>
    <path d="M 370 1088 L 410 1088 L 410 1110 L 370 1110" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="420" y="1103" fill="#111827">5. UPDATE applicant SET status=APPROVED, auto_approved=true · audit applicant.approve + applicant.auto_approved</text>
  </g>

  <!-- Dist step 6: Backend → DM Queue → Discord -->
  <g>
    <line x1="370" y1="1140" x2="830" y2="1140" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="600" y="1134" text-anchor="middle" fill="#111827">6. enqueue DM body: "Download your playtest build: &lt;url&gt;"</text>
  </g>

  <!-- Dist step 7: Discord → Player -->
  <g>
    <line x1="830" y1="1172" x2="140" y2="1172" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="485" y="1166" text-anchor="middle" fill="#111827">7. Discord delivers DM to applicant</text>
  </g>

  <!-- Dist step 8: Player → ADT: GET url -->
  <g>
    <line x1="140" y1="1206" x2="600" y2="1206" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="370" y="1200" text-anchor="middle" fill="#111827">8. player clicks link · GET &lt;url&gt; (downloads build directly from ADT)</text>
  </g>

  <!-- Note: player UI fallback -->
  <g>
    <rect x="60" y="1230" width="900" height="40" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="70" y="1246" font-size="11" fill="#713f12" font-style="italic">
      Player UI fallback: Pending.svelte for ADT playtests calls GetADTDownloadInfo(playtestId) (gated on APPROVED) and renders the URL + expiry in the
    </text>
    <text x="70" y="1260" font-size="11" fill="#713f12" font-style="italic">
      same view that STEAM_KEYS / AGS_CAMPAIGN use for the redeem code. Single Discord DM is the primary delivery; the in-UI surface is a safety net.
    </text>
  </g>

  <!-- ============================================================ LEGEND -->
  <g transform="translate(60, 1295)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#111827">Legend:</text>

    <line x1="60" y1="-4" x2="110" y2="-4" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="118" y="0" font-size="11" fill="#374151">sync call / RPC</text>

    <line x1="225" y1="-4" x2="275" y2="-4" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="283" y="0" font-size="11" fill="#374151">return value</text>

    <line x1="370" y1="-4" x2="420" y2="-4" stroke="#374151" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
    <text x="428" y="0" font-size="11" fill="#374151">browser navigation / 302</text>

    <rect x="585" y="-12" width="16" height="14" rx="2" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="608" y="0" font-size="11" fill="#374151">side-effect / DB write note</text>
  </g>
</svg>
